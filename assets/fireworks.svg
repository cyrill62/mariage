<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #050510;">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    
    <style>
      .firework {
        transform-origin: center;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 4 20;
        animation: explode 4s infinite ease-out;
      }
      
      /* Fusée 1 : Or et Rouge */
      #fw1 {
        stroke: #ff3366;
        animation-delay: 0s;
      }
      #fw1-inner {
        stroke: #ffcc00;
        animation-delay: 0s;
        stroke-dasharray: 2 15;
      }

      /* Fusée 2 : Bleu et Cyan */
      #fw2 {
        stroke: #00f0ff;
        animation-delay: 1.3s;
      }
      #fw2-inner {
        stroke: #ffffff;
        animation-delay: 1.3s;
        stroke-dasharray: 2 12;
      }

      /* Fusée 3 : Vert et Violet */
      #fw3 {
        stroke: #a020f0;
        animation-delay: 2.6s;
      }
      #fw3-inner {
        stroke: #39ff14;
        animation-delay: 2.6s;
        stroke-dasharray: 3 18;
      }

      /* Animation principale de l'explosion */
      @keyframes explode {
        0% {
          transform: scale(0);
          stroke-dashoffset: 0;
          opacity: 0;
        }
        1% {
          opacity: 1;
        }
        30% {
          stroke-dashoffset: -50;
          opacity: 1;
        }
        60% {
          transform: scale(1.2);
          stroke-dashoffset: -120;
          opacity: 0.8;
        }
        80% {
          opacity: 0;
          transform: scale(1.3);
        }
        100% {
          transform: scale(0);
          stroke-dashoffset: 0;
          opacity: 0;
        }
      }

      /* Animation des lueurs centrales */
      .flash {
        animation: flash-light 4s infinite ease-out;
        mix-blend-mode: screen;
      }
      @keyframes flash-light {
        0%, 20% { transform: scale(0); opacity: 0; }
        21% { opacity: 1; transform: scale(0.2); }
        25% { transform: scale(1); opacity: 0.4; }
        40% { opacity: 0; transform: scale(1.5); }
        100% { opacity: 0; }
      }
    </style>
  </defs>

  <g fill="#ffffff" opacity="0.3">
    <circle cx="120" cy="80" r="1" />
    <circle cx="340" cy="50" r="1.5" />
    <circle cx="710" cy="150" r="1" />
    <circle cx="50" cy="230" r="1.2" />
    <circle cx="650" cy="90" r="1" />
    <circle cx="230" cy="280" r="1.5" />
    <circle cx="780" cy="290" r="1" />
  </g>

  <g transform="translate(400, 220)">
    <circle class="flash" cx="0" cy="0" r="80" fill="url(#glow)" style="animation-delay: 0s; fill: #ff6688;"/>
    
    <g class="firework" id="fw1" stroke-width="4">
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(0)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(30)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(60)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(90)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(120)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(150)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(180)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(210)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(240)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(270)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(300)" />
      <line x1="0" y1="0" x2="0" y2="-150" transform="rotate(330)" />
    </g>
    
    <g class="firework" id="fw1-inner" stroke-width="3">
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(15)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(45)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(75)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(105)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(135)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(165)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(195)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(225)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(255)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(285)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(315)" />
      <line x1="0" y1="0" x2="0" y2="-100" transform="rotate(345)" />
    </g>
  </g>

  <g transform="translate(180, 160)">
    <circle class="flash" cx="0" cy="0" r="70" fill="url(#glow)" style="animation-delay: 1.3s; fill: #00ffff;"/>
    
    <g class="firework" id="fw2" stroke-width="3.5">
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(0)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(40)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(80)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(120)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(160)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(200)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(240)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(280)" />
      <line x1="0" y1="0" x2="0" y2="-120" transform="rotate(320)" />
    </g>
    
    <g class="firework" id="fw2-inner" stroke-width="2.5">
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(20)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(60)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(100)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(140)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(180)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(220)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(260)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(300)" />
      <line x1="0" y1="0" x2="0" y2="-80" transform="rotate(340)" />
    </g>
  </g>

  <g transform="translate(620, 190)">
    <circle class="flash" cx="0" cy="0" r="75" fill="url(#glow)" style="animation-delay: 2.6s; fill: #dd22ff;"/>
    
    <g class="firework" id="fw3" stroke-width="4">
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(0)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(45)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(90)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(135)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(180)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(225)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(270)" />
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(315)" />
    </g>
    
    <g class="firework" id="fw3-inner" stroke-width="2">
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(22.5)" />
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(67.5)" />
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(112.5)" />
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(157.5)" />
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(202.5)" />
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(247.5)" />
      <line x1="0" y1="0" x2="0" y2="-292.5" transform="rotate(292.5)" />
      <line x1="0" y1="0" x2="0" y2="-90" transform="rotate(337.5)" />
    </g>
  </g>
</svg>